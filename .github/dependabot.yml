version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      iaify-shared:
        patterns:
          - "Ai-road-4-You/*"
      github-official:
        patterns:
          - "actions/*"
